name: Release

on:
  push:
    tags:
      - "v*.*.*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build-packages:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - i686-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
          - armv7-unknown-linux-gnueabihf
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

      - uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Cache packaging tools
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin
          key: cargo-tools-deb-rpm-v1

      - name: Install packaging tools
        run: |
          which cargo-deb          || cargo install cargo-deb
          which cargo-generate-rpm || cargo install cargo-generate-rpm

      - name: Build
        run: cross build --target ${{ matrix.target }} --release

      - name: Package .deb
        run: cargo deb --target ${{ matrix.target }} --no-build

      - name: Package .rpm
        run: cargo generate-rpm --target ${{ matrix.target }}

      - uses: actions/upload-artifact@v4
        with:
          name: packages-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/debian/*.deb
            target/${{ matrix.target }}/generate-rpm/*.rpm

  publish:
    needs: build-packages
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**
          generate_release_notes: true
