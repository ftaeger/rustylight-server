[target.x86_64-unknown-linux-gnu]
pre-build = [
    "apt-get update && apt-get install -y --no-install-recommends libudev-dev",
]

[target.i686-unknown-linux-gnu]
pre-build = [
    "dpkg --add-architecture i386 && apt-get update && apt-get install -y --no-install-recommends libudev-dev:i386",
]

[target.aarch64-unknown-linux-gnu]
pre-build = [
    "dpkg --add-architecture arm64 && apt-get update && apt-get install -y --no-install-recommends libudev-dev:arm64",
]

[target.armv7-unknown-linux-gnueabihf]
pre-build = [
    "dpkg --add-architecture armhf && apt-get update && apt-get install -y --no-install-recommends libudev-dev:armhf",
]
